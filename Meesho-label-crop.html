<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="favicon-converter.html" type="image/x-icon">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meesho Label Generator</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f7f7f7;
    padding:20px;
}

.container{
    max-width:760px;
    margin:auto;
    background:#fff;
    padding:20px;
    border:1px solid #ddd;
    border-radius:8px;
}

.top{
    display:flex;
    gap:20px;
    align-items:center;
}

.logo{
    width:70px;
}

.upload-box{
    flex:1;
    border:1px solid #ccc;
    padding:18px;
    background:#fafafa;
}

.options{
    margin-top:18px;
    display:flex;
    gap:25px;
}

.preview{
    margin-top:20px;
}

#previewImg{
    max-width:100%;
    display:none;
    border:1px solid #ddd;
}

button{
    margin-top:20px;
    padding:12px 20px;
    background:#f43397;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    display:none;
}

@media(max-width:600px){
    .top{
        flex-direction:column;
        align-items:flex-start;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="top">
        <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/3/33/Meesho_logo.png">

        <div class="upload-box">
            <input type="file" id="fileInput" accept="image/*">
        </div>
    </div>

    <div class="options">
        <label>
            <input type="radio" name="printer" value="label" checked>
            Label Printer
        </label>

        <label>
            <input type="radio" name="printer" value="a4">
            A4 Printer
        </label>
    </div>

    <div class="preview">
        <img id="previewImg">
    </div>

    <button id="downloadBtn">Download Label</button>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const previewImg = document.getElementById("previewImg");
const downloadBtn = document.getElementById("downloadBtn");

let finalOutput = "";

fileInput.addEventListener("change", function(){
    const file = this.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        const img = new Image();

        img.onload = function(){
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            const printer = document.querySelector('input[name="printer"]:checked').value;

            if(printer === "label"){
                canvas.width = 400;
                canvas.height = 250;
            }else{
                canvas.width = 794;
                canvas.height = 1123;
            }

            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            finalOutput = canvas.toDataURL("image/png");

            previewImg.src = finalOutput;
            previewImg.style.display = "block";
            downloadBtn.style.display = "inline-block";
        };

        img.src = e.target.result;
    };

    reader.readAsDataURL(file);
});

downloadBtn.addEventListener("click", function(){
    const link = document.createElement("a");
    link.href = finalOutput;
    link.download = "meesho-label.png";
    link.click();
});
</script>

</body>
</html>
