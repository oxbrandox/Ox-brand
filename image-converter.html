<!DOCTYPE html>
<html lang="en">
<head>
   <link rel="icon" href="favicon-converter.html" type="image/x-icon">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Converter Tool</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #f5f9ff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .container {
        background: white;
        width: 100%;
        max-width: 450px;
        padding: 25px;
        border-radius: 18px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        border: 2px solid #0d6efd;
    }

    h2 {
        text-align: center;
        color: #0d6efd;
        margin-bottom: 20px;
    }

    input, select, button {
        width: 100%;
        padding: 12px;
        margin-top: 12px;
        border-radius: 10px;
        border: 1px solid #dce7ff;
        font-size: 15px;
    }

    button {
        background: #0d6efd;
        color: white;
        border: none;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background: #0056d6;
    }

    .preview {
        margin-top: 20px;
        text-align: center;
    }

    .preview img {
        width: 100%;
        max-height: 250px;
        object-fit: contain;
        border-radius: 12px;
        border: 2px dashed #0d6efd;
        padding: 8px;
    }

    .range-box {
        margin-top: 15px;
    }

    .range-box label {
        font-size: 14px;
        color: #333;
    }

    @media (max-width: 500px) {
        .container {
            padding: 18px;
        }
    }
</style>
</head>
<body>

<div class="container">
    <h2>Image Converter Tool</h2>

    <input type="file" id="upload" accept="image/*">

    <select id="format">
        <option value="image/jpeg">JPG</option>
        <option value="image/png">PNG</option>
        <option value="image/webp">WEBP</option>
    </select>

    <div class="range-box">
        <label>Compression Quality: <span id="qualityValue">80</span>%</label>
        <input type="range" id="quality" min="10" max="100" value="80">
    </div>

    <button onclick="convertImage()">Convert Image</button>
    <button id="downloadBtn" style="display:none;">Download Converted Image</button>

    <div class="preview">
        <img id="previewImg" src="" alt="" style="display:none;">
    </div>
</div>

<script>
let convertedFile = "";

const qualitySlider = document.getElementById("quality");
const qualityValue = document.getElementById("qualityValue");

qualitySlider.addEventListener("input", () => {
    qualityValue.innerText = qualitySlider.value;
});

function convertImage() {
    const fileInput = document.getElementById("upload");
    const format = document.getElementById("format").value;
    const quality = qualitySlider.value / 100;

    if (!fileInput.files[0]) {
        alert("Please upload an image first");
        return;
    }

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        const img = new Image();

        img.onload = function() {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            canvas.width = img.width;
            canvas.height = img.height;

            ctx.drawImage(img, 0, 0);

            convertedFile = canvas.toDataURL(format, quality);

            const preview = document.getElementById("previewImg");
            preview.src = convertedFile;
            preview.style.display = "block";

            document.getElementById("downloadBtn").style.display = "block";
        };

        img.src = e.target.result;
    };

    reader.readAsDataURL(file);
}

document.getElementById("downloadBtn").addEventListener("click", () => {
    const link = document.createElement("a");
    link.href = convertedFile;
    link.download = "converted-image";
    link.click();
});
</script>

</body>
</html>
