<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flipkart Label Crop Tool</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial,sans-serif;
    }

    body{
        background:#f4f9ff;
        padding:20px;
    }

    .container{
        max-width:420px;
        margin:auto;
        background:#fff;
        padding:20px;
        border-radius:18px;
        box-shadow:0 8px 20px rgba(0,0,0,0.08);
        border:2px solid #0d6efd;
    }

    h2{
        text-align:center;
        color:#0d6efd;
        margin-bottom:18px;
    }

    input, select, button{
        width:100%;
        padding:12px;
        margin-top:12px;
        border-radius:10px;
        border:1px solid #d9e5ff;
        font-size:15px;
    }

    button{
        background:#0d6efd;
        color:white;
        border:none;
        cursor:pointer;
        font-weight:bold;
    }

    button:hover{
        background:#0056d6;
    }

    .preview-box{
        margin-top:18px;
        text-align:center;
    }

    canvas{
        max-width:100%;
        border:2px dashed #0d6efd;
        border-radius:12px;
        margin-top:10px;
    }

    @media(max-width:480px){
        .container{
            padding:15px;
        }
    }
</style>
</head>
<body>

<div class="container">
    <h2>Flipkart Label Crop Tool</h2>

    <input type="file" id="upload" accept="image/*">

    <select id="format">
        <option value="image/png">PNG</option>
        <option value="image/jpeg">JPG</option>
        <option value="image/webp">WEBP</option>
    </select>

    <button onclick="cropAndConvert()">Crop & Convert</button>
    <button id="downloadBtn" style="display:none;">Download</button>

    <div class="preview-box">
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
const upload = document.getElementById('upload');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const downloadBtn = document.getElementById('downloadBtn');

let convertedImage = "";

function cropAndConvert(){
    const file = upload.files[0];
    if(!file) return alert("Upload image first");

    const reader = new FileReader();

    reader.onload = function(e){
        const img = new Image();

        img.onload = function(){

            // Flipkart label crop size
            const cropWidth = 400;
            const cropHeight = 250;

            canvas.width = cropWidth;
            canvas.height = cropHeight;

            ctx.clearRect(0,0,cropWidth,cropHeight);

            // center crop
            let sx = (img.width - cropWidth)/2;
            let sy = (img.height - cropHeight)/2;

            if(sx < 0) sx = 0;
            if(sy < 0) sy = 0;

            ctx.drawImage(
                img,
                sx, sy,
                cropWidth, cropHeight,
                0,0,
                cropWidth, cropHeight
            );

            const format = document.getElementById('format').value;
            convertedImage = canvas.toDataURL(format,0.9);

            downloadBtn.style.display = "block";
        };

        img.src = e.target.result;
    };

    reader.readAsDataURL(file);
}

downloadBtn.addEventListener("click", function(){
    const link = document.createElement('a');
    link.href = convertedImage;
    link.download = "flipkart-label";
    link.click();
});
</script>

</body>
</html>
