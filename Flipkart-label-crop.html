<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="favicon-16x16.png" type="image/x-icon">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipkart Label Tool</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f5f5f5;
        padding:20px;
    }

    .tool-box{
        max-width:760px;
        margin:auto;
        background:#fff;
        padding:20px;
        border:1px solid #ddd;
    }

    .top-row{
        display:flex;
        align-items:center;
        gap:20px;
    }

    .logo{
        width:60px;
        height:60px;
    }

    .upload-box{
        flex:1;
        border:1px solid #ccc;
        padding:18px;
        background:#fafafa;
    }

    .radio-group{
        margin-top:18px;
        display:flex;
        gap:25px;
        font-size:28px;
    }

    .radio-group label{
        font-size:16px;
    }

    #preview{
        margin-top:20px;
        max-width:100%;
        display:none;
        border:1px solid #ddd;
    }

    button{
        margin-top:20px;
        padding:12px 20px;
        background:#2874f0;
        color:#fff;
        border:none;
        cursor:pointer;
        display:none;
    }

    @media(max-width:600px){
        .top-row{
            flex-direction:column;
            align-items:flex-start;
        }
    }
</style>
</head>
<body>

<div class="tool-box">

    <div class="top-row">
        <img class="logo" src="https://img1a.flixcart.com/www/linchpin/fk-cp-zion/img/fk-logo_f64bb3.png">

        <div class="upload-box">
            <input type="file" id="fileInput" accept="image/*">
        </div>
    </div>

    <div class="radio-group">
        <label>
            <input type="radio" name="printer" value="label" checked>
            Label Printer
        </label>

        <label>
            <input type="radio" name="printer" value="a4">
            A4 Printer
        </label>
    </div>

    <img id="preview">

    <button id="downloadBtn">Download Label</button>

</div>

<script>
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const downloadBtn = document.getElementById("downloadBtn");

let finalImage = "";

fileInput.addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        const img = new Image();

        img.onload = function(){
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            const printerType = document.querySelector('input[name="printer"]:checked').value;

            if(printerType === "label"){
                canvas.width = 400;
                canvas.height = 250;
            } else {
                canvas.width = 794;
                canvas.height = 1123;
            }

            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            finalImage = canvas.toDataURL("image/png");

            preview.src = finalImage;
            preview.style.display = "block";
            downloadBtn.style.display = "inline-block";
        };

        img.src = e.target.result;
    };

    reader.readAsDataURL(file);
});

downloadBtn.addEventListener("click", function(){
    const link = document.createElement("a");
    link.href = finalImage;
    link.download = "flipkart-label.png";
    link.click();
});
</script>

</body>
</html>
